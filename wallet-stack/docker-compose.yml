services:
  bitcoin:
    image: ruimarinho/bitcoin-core:24
    restart: unless-stopped
    command:
      - -printtoconsole
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=172.16.0.0/12
      - -rpcuser=${BITCOIN_RPC_USER}
      - -rpcpassword=${BITCOIN_RPC_PASSWORD}
      - -prune=550
      - -txindex=0
      - -wallet=cryptoqr
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
    ports:
      - "127.0.0.1:8332:8332"

  litecoin:
    image: uphold/litecoin-core:0.21
    restart: unless-stopped
    command:
      - -printtoconsole
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=172.16.0.0/12
      - -rpcuser=${LITECOIN_RPC_USER}
      - -rpcpassword=${LITECOIN_RPC_PASSWORD}
      - -prune=550
      - -txindex=0
      - -wallet=cryptoqr
    volumes:
      - litecoin-data:/home/litecoin/.litecoin
    ports:
      - "127.0.0.1:9332:9332"

  monerod:
    image: sethsimmons/simple-monerod:latest
    profiles:
      - local-monero
    restart: unless-stopped
    command:
      - --non-interactive
      - --prune-blockchain
      - --restricted-rpc
      - --rpc-bind-ip=0.0.0.0
      - --confirm-external-bind
    volumes:
      - monero-chain:/home/monero/.bitmonero
    ports:
      - "127.0.0.1:18081:18081"

  monero-wallet-rpc:
    image: sethsimmons/simple-monero-wallet-rpc:latest
    restart: unless-stopped
    command:
      - --rpc-bind-port=18083
      - --rpc-ssl=disabled
      - --rpc-login=${MONERO_WALLET_RPC_USER}:${MONERO_WALLET_RPC_PASSWORD}
      - --daemon-address=${MONERO_DAEMON_ADDRESS}
      - --wallet-dir=/wallets
    volumes:
      - monero-wallets:/wallets
    ports:
      - "127.0.0.1:18083:18083"

  wallet-tools:
    build:
      context: ./tools
    profiles:
      - tools
    env_file:
      - .env
    volumes:
      - ./out:/out
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./tools
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WALLET_API_DB: /out/wallet-api.sqlite3
      XMR_WALLET_RPC_URL: http://monero-wallet-rpc:18083
    volumes:
      - ./out:/out
    ports:
      - "127.0.0.1:8088:8080"
    entrypoint: []
    command:
      - uvicorn
      - wallet_api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bitcoin-data:
  litecoin-data:
  monero-chain:
  monero-wallets:

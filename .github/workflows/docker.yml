name: Build and release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Fast CI suite
        run: bun run test:ci

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta-vars.outputs.image_name }}
      image_tag: ${{ steps.meta-vars.outputs.image_tag }}
      is_semver_tag: ${{ steps.meta-vars.outputs.is_semver_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set metadata variables
        id: meta-vars
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            image_tag="${version}"
          else
            version="$(node -p "require('./package.json').version")"
            image_tag="latest"
          fi

          echo "APP_VERSION=${version}" >> "$GITHUB_ENV"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "is_semver_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_semver_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v') && steps.meta-vars.outputs.is_semver_tag != 'true'
        run: |
          echo "::error::Tag '${GITHUB_REF_NAME}' is not a valid SemVer tag. Expected vMAJOR.MINOR.PATCH, optionally with prerelease/build metadata."
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=cryptoqrtool
          cache-to: type=gha,mode=max,scope=cryptoqrtool

  release:
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.is_semver_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          image_name="${{ needs.docker.outputs.image_name }}"
          version="${{ needs.docker.outputs.image_tag }}"
          release_args=(
            "${GITHUB_REF_NAME}"
            --title "${GITHUB_REF_NAME}"
            --generate-notes
            --verify-tag
            --notes "Docker image: ${image_name}:${version}"
          )

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease --latest=false)
          else
            release_args+=(--latest)
          fi

          gh release create "${release_args[@]}"
